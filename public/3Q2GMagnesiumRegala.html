<!DOCTYPE html>
<html lang="en">
<head>
    <title>Club Application Form</title>

    <style>

        body {
            padding: 100px
        }
    

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            font-size: 14px;

        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: blue;
           
        }

        .radio-group {
            margin-top: 10px;
        }

        .radio-group input {
            width: auto;
            margin-right: 5px;
        }

        button {
            padding: 10px 15px;
            font-size: 15px;
            margin-right: 10px;
            cursor: pointer;
        }

    </style>

<script>
    let signupString = localStorage.getItem("clubsignups")
if (!signupString) { signupsList = {} } 
else signupsList = JSON.parse(signupString) 

const form = document.getElementById("dForm"); 


form.addEventListener("submit", function(e) { 
    e.preventDefault(); 

    if (confirm("Sure You Want To Save Your Work?")) {   
      
        const data = new FormData(form);


        const obj = Object.fromEntries(data.entries()); 
      
        signupsList[obj.sid] = {};
        for (let key in obj) { 
            if (key != "sid") { 
                signupsList[obj.sid][key] = obj[key];
            }
        }
        
        console.log(signupsList) 
        signupString = JSON.stringify(signupsList) 
        localStorage.setItem("clubsignups", signupString) 
        form.submit();
    }
  });


form.addEventListener("reset", function(e) { 
  if (!confirm("Sure you want to clear your data?")) {
    e.preventDefault();
  }
});
show.onclick = function() {
  window.location.href = "viewSignUps.html";
}
function changeColor(ele) {
  ele.style.backgroundColor = "blue";
} 
function resetColor(ele) {
  ele.style.backgroundColor = "white";
  ele.style.border="2px solid black"
  if (!ele.value.trim()) { 
    ele.style.border="2px solid red"
    ele.style.backgroundColor="lightpink"
  }
} 
</script>
 
</head>
<body>
    <a href="viewSignUps.html">View Sign Ups</a> 

<form>
    <fieldset>
        
        <label for="studentId">Student ID</label>
        <input type="number" id="studentId" name="studentId" required>

        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required>

        <label for="birthday">Birthday</label>
        <input type="date" id="birthday" name="birthday" required>
 
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required>
    </fieldset>

    <fieldset>

        <label for="mobile">Mobile Phone</label>
        <input type="text" id="mobile" name="mobile" required>

        <label for="grade">Grade Level</label>
        <select id="grade" name="grade" required>
            <option disabled selected value> -- select an option -- </option>
            <option value="g7">Grade 7</option>
            <option value="g8">Grade 8</option>
            <option value="g9">Grade 9</option>
            <option value="g10">Grade 10</option>
            <option value="g11">Grade 11</option>
            <option value="g12">Grade 12</option>
         </select>

        <label>Intern / Extern</label>
        <div class="radio-group">
            <input type="radio" id="intern" name="intext" value="int" required>
            <label for="intern">Intern</label>

            <input type="radio" id="extern" name="intext" value="ext">
            <label for="extern">Extern</label>
        </div>

        <label for="organization">Preferred Organization / Club</label>
        <select id="organization" name="organization" required>
            <option value=""> </option>
            <option value="alianti">Alianti</option>
            <option value="volant">Volant</option>
            <option value="astrosoc">AstroSoc</option>
            <option value="bravura">Bravura</option>
            <option value="computron">Computron</option>
        </select>
    </fieldset>

    <label for="reason">Why do you want to join</label>
    <textarea id="reason" name="reason" required></textarea>    


        <fieldset>
          <legend>Action Buttons</legend>
          <button type="submit"> Accept </button>
          <input type="reset" value=" Clear " />
        </fieldset> 
      </form>
    
</form>

</body>
</html>
